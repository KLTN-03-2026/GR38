tags:
  - name: Admin
    description: Các API dành riêng cho Quản trị viên quản lý hệ thống (Yêu cầu quyền Admin)

paths:
  /api/v1/admin/users:
    get:
      summary: Lấy danh sách tất cả người dùng
      description: Trả về danh sách người dùng. Hỗ trợ lọc theo vai trò thông qua query parameter.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [ADMIN, TEACHER, LEARNER]
          description: Lọc danh sách theo vai trò (VD chọn Teacher để xem danh sách giáo viên)
      responses:
        '200':
          description: Lấy danh sách thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 5
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        fullName:
                          type: string
                        email:
                          type: string
                        role:
                          type: string
        '401':
          description: Chưa đăng nhập hoặc Token không hợp lệ
        '403':
          description: Không có quyền truy cập (Tài khoản không phải Admin)

    post:
      summary: Thêm mới người dùng
      description: Tạo tài khoản người dùng mới. Mật khẩu sẽ được hệ thống tự động sinh ra dựa trên vai trò (Role) và trả về trong response để Admin gửi cho người dùng.
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullName
                - email
              properties:
                fullName:
                  type: string
                  description: Họ và tên người dùng
                  example: Nguyễn Văn A
                email:
                  type: string
                  description: Địa chỉ email (duy nhất)
                  example: nguyenvena@example.com
                role:
                  type: string
                  description: Vai trò của người dùng (Mặc định là LEARNER)
                  enum: [ADMIN, TEACHER, LEARNER]
                  example: TEACHER
      responses:
        '201':
          description: Tạo tài khoản thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Tạo tài khoản thành công
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                      fullName:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
                      autoGeneratedPassword:
                        type: string
                        description: Mật khẩu tự động tạo cho user
                        example: Teacher@123
        '400':
          description: Thiếu thông tin hoặc Email đã tồn tại
        '401':
          description: Chưa đăng nhập
        '403':
          description: Không có quyền truy cập

  /api/v1/admin/users/{id}:
    get:
      summary: Xem chi tiết một tài khoản
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID của người dùng cần xem (Lấy từ MongoDB)
      responses:
        '200':
          description: Thành công
        '401':
          description: Chưa đăng nhập
        '403':
          description: Không có quyền truy cập
        '404':
          description: Không tìm thấy người dùng

    put:
      summary: Cập nhật thông tin tài khoản (Vai trò, Khóa/Mở khóa hoặc Duyệt giáo viên)
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID của người dùng cần cập nhật
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  description: Cập nhật vai trò mới cho người dùng
                  enum: [ADMIN, TEACHER, LEARNER]
                  example: TEACHER
                isActive:
                  type: boolean
                  description: Trạng thái hoạt động (true = Hoạt động, false = Khóa tài khoản)
                  example: true
                teacherApprovalStatus:
                  type: string
                  description: Trạng thái duyệt giáo viên (Chỉ áp dụng nếu user là Teacher)
                  enum: [pending, approved, rejected]
                  example: approved
      responses:
        '200':
          description: Cập nhật trạng thái thành công
        '400':
          '400':
          description: "Lỗi Logic (VD: Cố gắng duyệt giáo viên cho user không phải Teacher)"
        '401':
          description: Chưa đăng nhập
        '403':
          description: Không có quyền truy cập
        '404':
          description: Không tìm thấy người dùng

    delete:
      summary: Xóa vĩnh viễn một tài khoản
      description: Cảnh báo Hành động này sẽ xóa hoàn toàn user khỏi database.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID của người dùng cần xóa
      responses:
        '200':
          description: Xóa tài khoản thành công
        '401':
          description: Chưa đăng nhập
        '403':
          description: Không có quyền truy cập
        '404':
          description: Không tìm thấy người dùng
/api/v1/admin/quizzes:
    get:
      summary: Lấy danh sách tất cả bài trắc nghiệm (Quản lý Quiz)
      description: Trả về danh sách toàn bộ các bộ câu hỏi trắc nghiệm (Quiz) trên hệ thống, bao gồm cả các bài do AI tạo và Giáo viên tự soạn. Kèm theo thống kê số lượt làm bài và điểm trung bình. Hỗ trợ tìm kiếm theo tên và phân trang.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Số thứ tự trang hiện tại
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Số lượng bài trắc nghiệm trên mỗi trang
        - in: query
          name: search
          schema:
            type: string
          description: Từ khóa tìm kiếm theo tiêu đề của bài trắc nghiệm
      responses:
        '200':
          description: Lấy danh sách bài trắc nghiệm thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          example: "65d...abc"
                        title:
                          type: string
                          example: "Trắc nghiệm Lịch sử Triều Nguyễn"
                        description:
                          type: string
                          example: "Bộ câu hỏi kiểm tra kiến thức về các đời vua nhà Nguyễn."
                        isAiGenerated:
                          type: boolean
                          example: false
                        totalAttempts:
                          type: integer
                          description: Tổng số lượt học viên đã làm bài này
                          example: 125
                        averageScore:
                          type: number
                          format: float
                          description: Điểm trung bình của tất cả lượt làm
                          example: 8.5
                  pagination:
                    type: object
                    properties:
                      total:
                        type: integer
                        description: Tổng số lượng bài quiz thỏa mãn điều kiện
                        example: 50
                      page:
                        type: integer
                        description: Trang hiện tại
                        example: 1
                      limit:
                        type: integer
                        description: Số lượng item trên 1 trang
                        example: 10
                      totalPages:
                        type: integer
                        description: Tổng số trang
                        example: 5
        '401':
          description: Chưa đăng nhập hoặc Token không hợp lệ
        '403':
          description: Không có quyền truy cập (Tài khoản không phải Admin)