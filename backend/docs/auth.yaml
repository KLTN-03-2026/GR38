tags:
  - name: Authentication
    description: Các API Quản lý đăng nhập, đăng ký và hồ sơ cá nhân

components:
  schemas:
    UserResponse:
      type: object
      properties:
        _id:
          type: string
        fullName:
          type: string
          example: Nguyễn Văn A
        email:
          type: string
          example: nguyenvana@gmail.com
        role:
          type: string
          example: Learner
        teacherApprovalStatus:
          type: string
          example: approved
        isActive:
          type: boolean
          example: true

paths:
  /api/auth/register:
    post:
      summary: Đăng ký tài khoản mới
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullName
                - email
                - password
              properties:
                fullName:
                  type: string
                  description: Họ và tên người dùng (tối thiểu 3 ký tự)
                  example: Nguyễn Văn A
                email:
                  type: string
                  description: Địa chỉ email hợp lệ
                  example: nguyenvana@gmail.com
                password:
                  type: string
                  description: Mật khẩu (tối thiểu 6 ký tự)
                  example: 123456
                role:
                  type: string
                  description: Vai trò của người dùng
                  enum: [Admin, Teacher, Learner]
                  example: Learner
      responses:
        '201':
          description: Đăng ký tài khoản thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user:
                    $ref: '#/components/schemas/UserResponse'
        '400':
          description: Lỗi Validation (thiếu trường, email sai định dạng, mật khẩu ngắn...)
        '409':
          description: Email đã tồn tại trong hệ thống

  /api/auth/login:
    post:
      summary: Đăng nhập vào hệ thống
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: nguyenvana@gmail.com
                password:
                  type: string
                  example: 123456
      responses:
        '200':
          description: Đăng nhập thành công, trả về Token
        '400':
          description: Dữ liệu gửi lên không hợp lệ
        '401':
          description: Sai email hoặc mật khẩu
        '403':
          description: Tài khoản bị vô hiệu hóa hoặc chờ duyệt

  /api/auth/profile:
    get:
      summary: Lấy thông tin cá nhân hiện tại
      description: Yêu cầu phải gửi kèm Token trong Header (Bearer Token)
      tags: [Authentication]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lấy thông tin thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UserResponse'
        '401':
          description: Chưa đăng nhập hoặc Token hết hạn
        '404':
          description: Không tìm thấy người dùng

    put:
      summary: Cập nhật thông tin cá nhân
      description: Cho phép cập nhật tên, email và ảnh đại diện (Yêu cầu Token)
      tags: [Authentication]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  example: Nguyễn Văn B
                email:
                  type: string
                  example: nguyenvanb_new@gmail.com
                profileImage:
                  type: string
                  example: "https://example.com/avatar.jpg"
      responses:
        '200':
          description: Cập nhật thành công
        '400':
          description: Lỗi Validation hoặc Email đã được người khác sử dụng
        '401':
          description: Chưa đăng nhập

  /api/auth/change-password:
    post:
      summary: Đổi mật khẩu
      description: Yêu cầu nhập mật khẩu cũ, mật khẩu mới và xác nhận (Yêu cầu Token)
      tags: [Authentication]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
                - newPasswordConfirm
              properties:
                currentPassword:
                  type: string
                  example: 123456
                newPassword:
                  type: string
                  example: 12345678
                newPasswordConfirm:
                  type: string
                  example: 12345678
      responses:
        '200':
          description: Đổi mật khẩu thành công
        '400':
          description: Mật khẩu xác nhận không khớp
        '401':
          description: Mật khẩu hiện tại không đúng hoặc chưa đăng nhập