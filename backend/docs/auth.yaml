tags:
  - name: Authentication
    description: Các API Quản lý đăng nhập, đăng ký, xác thực và hồ sơ cá nhân

components:
  schemas:
    UserResponse:
      type: object
      properties:
        _id:
          type: string
          example: 66a1f2c9b8d4e01f12345678
        fullName:
          type: string
          example: Nguyễn Văn A
        email:
          type: string
          example: nguyenvana@gmail.com
        role:
          type: string
          enum: [ADMIN, TEACHER, LEARNER]
          example: LEARNER
        teacherApprovalStatus:
          type: string
          enum: [pending, approved, rejected]
          example: approved
        isActive:
          type: boolean
          example: true
        authType:
          type: string
          enum: [local, google]
          example: local
          description: "Phương thức đăng nhập của tài khoản"
        profileImage:
          type: string
          nullable: true
          description: "URL ảnh đại diện (lưu trên Cloudinary hoặc Google)"
          example: "https://res.cloudinary.com/dynbuqe3g/image/upload/v123/avatar.jpg"
        createdAt:
          type: string
          format: date-time
          example: '2026-04-17T08:00:00.000Z'

paths:
  /api/v1/auth/register:
    post:
      summary: Đăng ký tài khoản mới (Local)
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullName
                - email
                - password
                - passwordConfirm
                - role
              properties:
                fullName:
                  type: string
                  minLength: 3
                  example: Nguyễn Văn A
                email:
                  type: string
                  format: email
                  example: nguyenvana@gmail.com
                password:
                  type: string
                  minLength: 6
                  example: "123456"
                passwordConfirm:
                  type: string
                  example: "123456"
                role:
                  type: string
                  enum: [ADMIN, TEACHER, LEARNER]
                  example: LEARNER
      responses:
        '201':
          description: Đăng ký thành công
        '400':
          description: Lỗi validation, email đã tồn tại hoặc mật khẩu xác nhận không khớp

  /api/v1/auth/login:
    post:
      summary: Đăng nhập vào hệ thống (Local)
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: nguyenvana@gmail.com
                password:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: Trả về thông tin user và JWT Token
        '400':
          description: Tài khoản tạo bằng Google không thể dùng form này
        '401':
          description: Sai thông tin đăng nhập
        '403':
          description: "Tài khoản bị khóa hoặc Giáo viên chưa được duyệt (teacherApprovalStatus: pending)"

  /api/v1/auth/google:
    post:
      summary: Đăng nhập / Đăng ký bằng Google
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: "Access token / ID token trả về từ SDK của Google"
                role:
                  type: string
                  enum: [TEACHER, LEARNER]
                  description: "Bắt buộc truyền lên nếu đây là lần đầu tiên user đăng nhập (để tạo tài khoản mới)"
      responses:
        '200':
          description: Đăng nhập thành công, trả về JWT của hệ thống
        '400':
          description: Thiếu token hoặc thiếu role (với user mới)
        '403':
          description: "Tài khoản bị khóa hoặc Giáo viên chưa được duyệt"

  /api/v1/auth/forgot-password:
    post:
      summary: Yêu cầu gửi mã OTP Quên mật khẩu
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  example: nguyenvana@gmail.com
      responses:
        '200':
          description: Mã OTP đã được gửi qua email
        '404':
          description: Email không tồn tại trong hệ thống
        '400':
          description: Tài khoản đăng nhập bằng Google không thể dùng tính năng này

  /api/v1/auth/reset-password:
    post:
      summary: Xác nhận OTP và đặt lại mật khẩu mới
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
                - newPassword
              properties:
                email:
                  type: string
                  example: nguyenvana@gmail.com
                otp:
                  type: string
                  example: "123456"
                  description: "Mã 6 số nhận được từ Email"
                newPassword:
                  type: string
                  example: "matkhaumoi123"
      responses:
        '200':
          description: Đổi mật khẩu thành công
        '400':
          description: OTP không chính xác hoặc đã hết hạn

  /api/v1/auth/profile:
    get:
      summary: Lấy thông tin cá nhân hiện tại
      tags: [Authentication]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UserResponse'

    put:
      summary: Cập nhật thông tin cá nhân
      description: "Có thể cập nhật văn bản (JSON) hoặc gửi kèm file ảnh (Multipart). Nếu gửi file ảnh, sử dụng field name là 'avatar'."
      tags: [Authentication]
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  example: Nguyễn Văn A (Mới)
                email:
                  type: string
                  example: newemail@gmail.com
                avatar:
                  type: string
                  format: binary
                  description: "File ảnh đại diện mới để tải lên Cloudinary"
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                profileImage:
                  type: string
                  description: "URL ảnh nếu đã có sẵn"
      responses:
        '200':
          description: Cập nhật thành công
        '401':
          description: Chưa đăng nhập

  /api/v1/auth/change-password:
    post:
      summary: Đổi mật khẩu (khi đã đăng nhập)
      tags: [Authentication]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
                - newPasswordConfirm
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                newPasswordConfirm:
                  type: string
      responses:
        '200':
          description: Đổi mật khẩu thành công
        '400':
          description: Lỗi validation hoặc Tài khoản Google không có mật khẩu để đổi
        '401':
          description: Mật khẩu hiện tại không đúng