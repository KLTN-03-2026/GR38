tags:
  - name: Notification
    description: Thông báo về các hoạt động liên quan đến tài liệu, quiz, flashcard của giáo viên như tạo, cập nhật, xóa.

components:
  schemas:
    NotificationItem:
      type: object
      properties:
        _id:
          type: string
          example: 66a1f2c9b8d4e01f1234c001
        title:
          type: string
          example: Tai lieu moi
        message:
          type: string
          example: Giao vien vua them tai lieu Chien dich Dien Bien Phu
        type:
          type: string
          enum: [DOCUMENT, QUIZ, FLASHCARD, SYSTEM]
          example: DOCUMENT
        referenceId:
          type: string
          example: 66a1f2c9b8d4e01f1234a111
        readBy:
          type: array
          items:
            type: string
            example: 66a1f2c9b8d4e01f1234b222
        isRead:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

paths:
  /api/v1/notifications:
    get:
      summary: Lấy danh sách thông báo của giáo viên
      tags: [Notification]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lay thong bao thanh cong
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotificationItem'
        "401":
          description: Chua dang nhap

  /api/v1/notifications/{id}/read:
    patch:
      summary: Đánh dấu thông báo là đã đọc
      tags: [Notification]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID thong bao
      responses:
        "200":
          description: Cap nhat thanh cong
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Da danh dau thong bao la da doc
        "404":
          description: Khong tim thay thong bao
