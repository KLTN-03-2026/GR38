tags:
  - name: Quiz
    description: Các API quản lý quiz, nộp bài và xem kết quả quiz

components:
  schemas:
    DocumentRef:
      type: object
      properties:
        _id:
          type: string
          example: 66a1f2c9b8d4e01f12340001
        title:
          type: string
          example: Lịch sử Việt Nam lớp 12
        fileName:
          type: string
          example: lich_su_12.pdf

    UserRef:
      type: object
      properties:
        _id:
          type: string
          example: 66a1f2c9b8d4e01f12340002
        fullName:
          type: string
          example: Nguyễn Văn A
        email:
          type: string
          example: giaovien@example.com

    QuizQuestion:
      type: object
      properties:
        _id:
          type: string
          example: 66a1f2c9b8d4e01f12345678
        question:
          type: string
          example: Chiến thắng Điện Biên Phủ diễn ra vào năm nào?
        options:
          type: array
          minItems: 4
          maxItems: 4
          items:
            type: string
          example:
            - '1953'
            - '1954'
            - '1955'
            - '1956'
        correctAnswer:
          type: string
          example: '1954'
        explanation:
          type: string
          example: Chiến thắng Điện Biên Phủ kết thúc vào ngày 7/5/1954.
        difficulty:
          type: string
          enum: [Dễ, Trung bình, Khó]
          example: Trung bình

    QuizBase:
      type: object
      properties:
        _id:
          type: string
          example: 66a1f2c9b8d4e01f12349999
        documentId:
          $ref: '#/components/schemas/DocumentRef'
        teacherId:
          $ref: '#/components/schemas/UserRef'
        title:
          type: string
          example: Bộ câu hỏi ôn tập Điện Biên Phủ
        description:
          type: string
          example: Quiz trắc nghiệm cho phần kháng chiến chống Pháp
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuizQuestion'
        totalQuestions:
          type: integer
          example: 10
        isAiGenerated:
          type: boolean
          example: false
        isPublished:
          type: boolean
          example: true
        tags:
          type: array
          items:
            type: string
          example: ["dien-bien-phu"]
        stats:
          type: object
          properties:
            enrolledLearners:
              type: integer
              example: 125
            totalAttempts:
              type: integer
              example: 42
        createdAt:
          type: string
          format: date-time
          example: '2026-04-17T08:00:00.000Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-04-17T08:15:00.000Z'

    QuizListResponse:
      allOf:
        - $ref: '#/components/schemas/QuizBase'

    QuizDetailResponse:
      allOf:
        - $ref: '#/components/schemas/QuizBase'

    QuizAnswerItem:
      type: object
      properties:
        questionId:
          type: string
          example: 66a1f2c9b8d4e01f12345678
        selectedAnswer:
          type: string
          example: '1954'

    QuizSubmitRequest:
      type: object
      properties:
        userAnswers:
          type: array
          description: Mảng đáp án người dùng gửi lên
          items:
            $ref: '#/components/schemas/QuizAnswerItem'
          example:
            - questionId: 66a1f2c9b8d4e01f12345678
              selectedAnswer: '1954'
            - questionId: 66a1f2c9b8d4e01f12345679
              selectedAnswer: Võ Nguyên Giáp
        answers:
          type: array
          description: Tên thay thế cho userAnswers mà backend vẫn chấp nhận
          items:
            $ref: '#/components/schemas/QuizAnswerItem'

    QuizSubmitQuestionDetail:
      type: object
      properties:
        questionId:
          type: string
          example: 66a1f2c9b8d4e01f12345678
        question:
          type: string
          example: Chiến thắng Điện Biên Phủ diễn ra vào năm nào?
        selectedAnswer:
          type: string
          example: '1954'
        correctAnswer:
          type: string
          example: '1954'
        explanation:
          type: string
          example: Chiến thắng Điện Biên Phủ kết thúc vào ngày 7/5/1954.
        isCorrect:
          type: boolean
          example: true

    QuizSubmitResponse:
      type: object
      properties:
        quizResultId:
          type: string
          example: 66a1f2c9b8d4e01f1234abcd
        score:
          type: integer
          example: 8
        correctCount:
          type: integer
          example: 8
        totalQuestions:
          type: integer
          example: 10
        details:
          type: array
          items:
            $ref: '#/components/schemas/QuizSubmitQuestionDetail'

    QuizHistoryResponse:
      type: object
      properties:
        _id:
          type: string
          example: 66a1f2c9b8d4e01f1234abcd
        userId:
          type: string
          example: 66a1f2c9b8d4e01f12340003
        quizId:
          type: object
          properties:
            _id:
              type: string
              example: 66a1f2c9b8d4e01f12349999
            title:
              type: string
              example: Lịch sử Việt Nam
        score:
          type: integer
          example: 8
        totalQuestions:
          type: integer
          example: 10
        createdAt:
          type: string
          format: date-time
          example: '2026-04-17T08:30:00.000Z'

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: Yêu cầu không hợp lệ
        statusCode:
          type: integer
          example: 400

paths:
  /api/v1/quizzes:
    post:
      summary: Tạo đề quiz thủ công
      description: Dành cho TEACHER hoặc ADMIN để tự soạn câu hỏi.
      tags: [Quiz]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Đề kiểm tra Lịch sử 12
                documentId:
                  type: string
                  example: 66a1f2c9b8d4e01f12340001
                description:
                  type: string
                  example: Gồm 5 câu hỏi trọng tâm
                questions:
                  type: array
                  items:
                    $ref: '#/components/schemas/QuizQuestion'
      responses:
        '201':
          description: Tạo thành công
        '400':
          description: Lỗi dữ liệu đầu vào (cần ít nhất 5 câu)

  /api/v1/quizzes/my-history:
    get:
      summary: Xem lịch sử các bài quiz đã làm
      description: Lấy danh sách kết quả bài làm của Học sinh (LEARNER).
      tags: [Quiz]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 8
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/QuizHistoryResponse'
        '401':
          description: Chưa đăng nhập

  /api/v1/quizzes/detail/{resultId}:
    get:
      summary: Xem chi tiết lại 1 bài thi đã nộp
      description: Trả về chi tiết câu đúng/sai dựa trên ID kết quả làm bài.
      tags: [Quiz]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: resultId
          required: true
          schema:
            type: string
          example: 66a1f2c9b8d4e01f1234abcd
          description: ID của bài kết quả (QuizResult ID)
      responses:
        '200':
          description: Thành công
        '404':
          description: Không tìm thấy kết quả

  /api/v1/quizzes/quiz/{id}:
    get:
      summary: Lấy chi tiết một quiz (Để làm bài)
      description: Dành cho LEARNER, TEACHER, ADMIN lấy đề bài.
      tags: [Quiz]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: 66a1f2c9b8d4e01f12349999
          description: ID của quiz cần xem
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/QuizDetailResponse'
        '404':
          description: Không tìm thấy quiz

  /api/v1/quizzes/document/{documentId}:
    get:
      summary: Lấy danh sách quiz theo tài liệu
      description: Dành cho tất cả người dùng đã đăng nhập.
      tags: [Quiz]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
          example: 66a1f2c9b8d4e01f12340001
          description: ID của tài liệu
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 2
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/QuizListResponse'

  /api/v1/quizzes/{quizId}/submit:
    post:
      summary: Nộp bài quiz
      description: Chấm điểm tự động và lưu kết quả cho LEARNER.
      tags: [Quiz]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: quizId
          required: true
          schema:
            type: string
          example: 66a1f2c9b8d4e01f12349999
          description: ID của đề quiz cần nộp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizSubmitRequest'
      responses:
        '201':
          description: Nộp bài thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Quiz đã được nộp thành công
                  data:
                    $ref: '#/components/schemas/QuizSubmitResponse'
        '400':
          description: Dữ liệu nộp bài không hợp lệ

  /api/v1/quizzes/{id}:
    delete:
      summary: Xóa quiz
      description: Chỉ TEACHER (người tạo) hoặc ADMIN được phép xóa.
      tags: [Quiz]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: 66a1f2c9b8d4e01f12349999
          description: ID của quiz cần xóa
      responses:
        '200':
          description: Xóa thành công
        '403':
          description: Không có quyền