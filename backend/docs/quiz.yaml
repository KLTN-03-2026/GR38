paths:
  /api/v1/quizzes:
    post:
      summary: Tạo đề quiz thủ công
      description: Dành cho TEACHER hoặc ADMIN để tự soạn câu hỏi. Hỗ trợ upload ảnh bìa (thumbnail) hoặc tự động lấy ảnh từ Document.
      tags: [Quiz]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Đề kiểm tra Lịch sử 12
                documentId:
                  type: string
                  example: 66a1f2c9b8d4e01f12340001
                  description: ID tài liệu (Nếu không upload thumbnail, hệ thống sẽ tự lấy ảnh của tài liệu này)
                description:
                  type: string
                  example: Gồm 5 câu hỏi trọng tâm
                questions:
                  type: string
                  description: Mảng các câu hỏi định dạng JSON string (Do gửi qua FormData)
                  example: '[{"question": "Chiến thắng Điện Biên Phủ diễn ra vào năm nào?", "options": ["1953", "1954", "1955", "1956"], "correctAnswer": "1954", "explanation": "Kết thúc ngày 7/5/1954", "difficulty": "Trung bình"}]'
                thumbnail:
                  type: string
                  format: binary
                  description: File ảnh bìa tải lên từ máy tính (nếu có)
      responses:
        '201':
          description: Tạo thành công
        '400':
          description: Lỗi dữ liệu đầu vào (cần ít nhất 5 câu hoặc JSON không hợp lệ)

  /api/v1/quizzes/my-history:
    get:
      summary: Xem lịch sử các bài quiz đã làm
      description: Lấy danh sách kết quả bài làm của Học sinh (LEARNER).
      tags: [Quiz]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 8
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/QuizHistoryResponse'
        '401':
          description: Chưa đăng nhập

  /api/v1/quizzes/my-quizzes:
    get:
      summary: Lấy danh sách toàn bộ bài quiz do giáo viên tạo
      description: Dành cho TEACHER quản lý kho đề cá nhân đã tạo (Bao gồm cả đề thủ công và AI tạo).
      tags: [Quiz]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 5
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/QuizListResponse'
        '401':
          description: Chưa đăng nhập hoặc không có quyền

  /api/v1/quizzes/detail/{resultId}:
    get:
      summary: Xem chi tiết lại 1 bài thi đã nộp
      description: Trả về chi tiết câu đúng/sai dựa trên ID kết quả làm bài.
      tags: [Quiz]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: resultId
          required: true
          schema:
            type: string
          example: 66a1f2c9b8d4e01f1234abcd
          description: ID của bài kết quả (QuizResult ID)
      responses:
        '200':
          description: Thành công
        '404':
          description: Không tìm thấy kết quả

  /api/v1/quizzes/document/{documentId}:
    get:
      summary: Lấy danh sách quiz theo tài liệu
      description: Dành cho tất cả người dùng đã đăng nhập.
      tags: [Quiz]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
          example: 66a1f2c9b8d4e01f12340001
          description: ID của tài liệu
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 2
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/QuizListResponse'

  /api/v1/quizzes/{quizId}/submit:
    post:
      summary: Nộp bài quiz
      description: Chấm điểm tự động và lưu kết quả. Hệ thống tự động phân biệt bài nộp của TEACHER (test) và LEARNER. Cần truyền thêm `timeSpent` (thời gian làm bài bằng giây) trong request body.
      tags: [Quiz]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: quizId
          required: true
          schema:
            type: string
          example: 66a1f2c9b8d4e01f12349999
          description: ID của đề quiz cần nộp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizSubmitRequest'
      responses:
        '201':
          description: Nộp bài thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Nộp bài thành công
                  data:
                    $ref: '#/components/schemas/QuizSubmitResponse'
        '400':
          description: Dữ liệu nộp bài không hợp lệ

  /api/v1/quizzes/{quizId}/questions/{questionId}:
    put:
      summary: Cập nhật nội dung một câu hỏi cụ thể trong Quiz
      description: Dành cho TEACHER (sở hữu) hoặc ADMIN sửa lại đáp án hoặc nội dung của một câu hỏi.
      tags: [Quiz]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: quizId
          required: true
          schema:
            type: string
          example: 66a1f2c9b8d4e01f12349999
          description: ID của bộ Quiz
        - in: path
          name: questionId
          required: true
          schema:
            type: string
          example: 66a1f2c9b8d4e01f12345678
          description: ID của câu hỏi cần sửa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                  example: Trận Điện Biên Phủ diễn ra vào năm nào? (Đã sửa)
                options:
                  type: array
                  items:
                    type: string
                  example: ["1952", "1953", "1954", "1955"]
                correctAnswer:
                  type: string
                  example: "1954"
                explanation:
                  type: string
                  example: Trận chiến kết thúc ngày 7/5/1954.
                difficulty:
                  type: string
                  enum: [Dễ, Trung bình, Khó]
                  example: Trung bình
      responses:
        '200':
          description: Cập nhật câu hỏi thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Đã cập nhật câu hỏi Quiz thành công
                  data:
                    $ref: '#/components/schemas/QuizQuestion'
        '403':
          description: Không có quyền chỉnh sửa
        '404':
          description: Không tìm thấy bộ Quiz hoặc câu hỏi

  /api/v1/quizzes/{id}:
    get:
      summary: Lấy chi tiết một quiz (Để làm bài)
      description: Dành cho LEARNER, TEACHER, ADMIN lấy đề bài.
      tags: [Quiz]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: 66a1f2c9b8d4e01f12349999
          description: ID của quiz cần xem
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/QuizDetailResponse'
        '404':
          description: Không tìm thấy quiz
    put:
      summary: Cập nhật thông tin chung của bộ Quiz
      description: Dành cho TEACHER (người tạo) hoặc ADMIN để sửa tiêu đề, mô tả, tags hoặc ảnh bìa (thumbnail).
      tags: [Quiz]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: 66a1f2c9b8d4e01f12349999
          description: ID của đề quiz cần sửa
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Đề kiểm tra Lịch sử 12 (Cập nhật)
                description:
                  type: string
                  example: Gồm 10 câu hỏi nâng cao
                tags:
                  type: string
                  description: Mảng tags dạng JSON string (VD '["lich-su", "lop-12"]')
                thumbnail:
                  type: string
                  format: binary
                  description: File ảnh bìa mới (nếu có)
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Đã cập nhật thông tin bộ Quiz thành công
                  data:
                    $ref: '#/components/schemas/QuizBase'
        '403':
          description: Không có quyền chỉnh sửa
        '404':
          description: Không tìm thấy bộ Quiz
    delete:
      summary: Xóa quiz
      description: Chỉ TEACHER (người tạo) hoặc ADMIN được phép xóa.
      tags: [Quiz]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: 66a1f2c9b8d4e01f12349999
          description: ID của quiz cần xóa
      responses:
        '200':
          description: Xóa thành công
        '403':
          description: Không có quyền