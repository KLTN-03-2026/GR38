version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app 
      - /app/node_modules 
      - ./backend/upload:/app/upload 
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend/ai-history-learning
    container_name: frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/ai-history-learning/.env
    volumes:
      - ./frontend/ai-history-learning:/app 
      - /app/node_modules 
    depends_on:
      - backend
    restart: unless-stopped